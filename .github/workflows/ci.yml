name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check lynx/ scripts/ simulator/

      - name: Mypy type check
        run: mypy lynx/

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=lynx --cov-report=term --cov-fail-under=80

      - name: Run evaluation (in-process)
        run: python -m scripts.evaluate --in-process

  lint-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug build context
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== dashboard/ ==="
          ls -la dashboard/
          echo "=== Dockerfiles ==="
          ls -la Dockerfile dashboard/Dockerfile

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: lynx-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: false
          load: true
          tags: lynx-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  quality-gate:
    needs: [lint-python, test-python, lint-dashboard, docker-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report job results
        run: |
          echo "## Phase 2 Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python lint & type check | ${{ needs.lint-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python tests & evaluation | ${{ needs.test-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard lint & build | ${{ needs.lint-dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY

          failed=0
          for job in lint-python test-python lint-dashboard docker-build; do
            r="${{ needs[job].result }}"
            echo "$job=$r"
            if [ "$r" != "success" ]; then
              echo "::error::quality-gate: $job is $r"
              failed=1
            fi
          done
          [ $failed -eq 0 ]
